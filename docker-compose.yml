services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${AGENT_DATABASE_PASSWORD:-agent_dev_pass}
      POSTGRES_DB: trading_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d trading_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  agent:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - AGENT_DATABASE_PASSWORD=${AGENT_DATABASE_PASSWORD:-agent_dev_pass}
      - AGENT_SERVER_API_KEY=${AGENT_SERVER_API_KEY:-}
      - AGENT_BLOCKCHAIN_PRIVATE_KEY=${AGENT_BLOCKCHAIN_PRIVATE_KEY:-}
      - AGENT_BLOCKCHAIN_RPC_URL=${AGENT_BLOCKCHAIN_RPC_URL:-https://polygon-rpc.com}
      - AGENT_BLOCKCHAIN_CTF_EXCHANGE_ADDRESS=${AGENT_BLOCKCHAIN_CTF_EXCHANGE_ADDRESS:-0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E}
      - AGENT_BLOCKCHAIN_POLYMARKET_API_KEY=${AGENT_BLOCKCHAIN_POLYMARKET_API_KEY:-}
      - AGENT_AUTO_WITHDRAW_SAFE_WALLET_ADDRESS=${AGENT_AUTO_WITHDRAW_SAFE_WALLET_ADDRESS:-}
      - AGENT_NOTIFICATION_TELEGRAM_BOT_TOKEN=${AGENT_NOTIFICATION_TELEGRAM_BOT_TOKEN:-}
      - AGENT_NOTIFICATION_TELEGRAM_CHAT_ID=${AGENT_NOTIFICATION_TELEGRAM_CHAT_ID:-}
      - AGENT_TRADING_MODE=${AGENT_TRADING_MODE:-paper}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped

volumes:
  pgdata:
