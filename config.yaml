# AI Agent Trading Otonom — Configuration
# Environment variables override these values (prefix: AGENT_)

server:
  host: "0.0.0.0"
  port: 8080
  api_key: "" # Use env: AGENT_SERVER_API_KEY (required — protect REST API)

database:
  host: "localhost"
  port: 5432
  user: "agent"
  password: "" # Use env: AGENT_DATABASE_PASSWORD
  name: "trading_agent"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5

blockchain:
  rpc_url: "https://polygon-rpc.com"
  chain_id: 137              # Polygon mainnet — Polymarket berjalan di sini
  private_key: ""            # Use env: AGENT_BLOCKCHAIN_PRIVATE_KEY (live mode only)
  usdc_contract: "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174" # USDC (PoS) on Polygon
  ctf_exchange_address: "0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E" # Polymarket CTF Exchange on Polygon
  polymarket_api_key: ""     # Use env: AGENT_BLOCKCHAIN_POLYMARKET_API_KEY
  gas_estimation_method: "eip1559"
  max_gas_price_gwei: 100.0  # Polygon gas — lebih tinggi dari Base
  gas_price_buffer: 1.2

trading:
  mode: "paper" # live, paper
  initial_balance: 10.00
  daily_profit_target: 0.25
  default_order_type: "limit"

risk:
  max_slippage_tolerance: 0.05  # 5% max slippage (SRS requirement)
  stop_loss: 0.05               # 5% stop-loss per position (SRS: max 5% SP)
  max_position_per_market: 0.20 # Max 20% of balance per market
  max_total_exposure: 0.70      # Max 70% total exposure
  daily_loss_limit: 0.05        # 5% daily loss limit — halt trading for the day
  max_price_impact_threshold: 0.03  # >3% impact → cancel or split
  price_impact_auto_split: true
  order_split_threshold: 2.00   # Orders > $2 eligible for splitting (scaled for $10 balance)
  order_split_max_chunks: 3
  order_split_delay_ms: 2000

market_analysis:
  poll_interval_seconds: 30
  confidence_threshold: 0.65
  mispricing_threshold: 0.05

liquidity:
  spread_check_interval: 15
  spread_warning_multiplier: 2.0
  spread_halt_multiplier: 4.0
  spread_normalization_window: 3600
  volume_aware_execution: true
  volume_percentile_min: 50
  volume_queue_timeout: 1800
  volume_profile_window: 168

auto_withdraw:
  enabled: false  # Disabled — fund dikelola internal Polymarket, withdraw manual oleh Irishdara
  safe_wallet_address: ""
  min_hot_wallet_balance: 10.00
  check_interval_seconds: 300

resolution:
  check_interval_seconds: 300
  claim_max_retries: 5

circuit_breaker:
  enabled: true
  cooldown_seconds: 600          # 10 minutes halt after trip
  max_consecutive_failures: 3
  rapid_drop_threshold: 0.10     # 10% balance drop in window → halt
  rapid_drop_window_seconds: 300 # 5 minute window

nonce:
  stuck_timeout_seconds: 180
  replacement_gas_multiplier: 1.3
  max_pending_transactions: 3

reconciliation:
  on_startup: true
  interval_seconds: 900
  tolerance: 0.01

notification:
  telegram_bot_token: "" # Use env: AGENT_NOTIFICATION_TELEGRAM_BOT_TOKEN
  telegram_chat_id: ""   # Use env: AGENT_NOTIFICATION_TELEGRAM_CHAT_ID
  email_enabled: false
  alert_cooldown_seconds: 60

multi_venue:
  enabled: false
  min_venues_for_split: 2

# Telegram feed — external news context for ML predictor
# Uses a second Telegram account (userbot) to monitor news channels.
# Credentials via env: AGENT_TELEGRAM_FEED_API_ID, AGENT_TELEGRAM_FEED_API_HASH, AGENT_TELEGRAM_FEED_PHONE
telegram_feed:
  enabled: false           # Set to true when credentials are configured
  session_file: "./data/tg_session.json"
  poll_interval_seconds: 90
  channels:
    - marketfeed           # t.me/marketfeed — primary news source

scalper:
  enabled: false
  series_slug: "btc-up-or-down-5m"
  trade_size: 1.0
  total_capital: 3.0
  take_profit_min: 0.02
  take_profit_max: 0.05
  stop_loss: 0.03
  momentum_threshold: 0.6
  builder_address: ""
  signer_address: ""
